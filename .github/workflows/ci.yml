name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

      # Tests run the real Express app against mongodb-memory-server (the
      # mongod binary is downloaded on first run and cached by the runner's
      # tooling) — no external database or .env file is needed. Only the
      # values below are required; Google OAuth is flagged off so passport
      # never demands real client credentials.
      - run: npm test
        env:
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          ENABLE_GOOGLE_AUTH: "false"

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
